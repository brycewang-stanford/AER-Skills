<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>Poster 04 - Referee Simulation</title>
<style>
@font-face { font-family: "Work Sans Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/WorkSans-Regular.ttf") format("truetype"); font-weight: 400; }
@font-face { font-family: "Work Sans Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/WorkSans-Bold.ttf") format("truetype"); font-weight: 700; }
@font-face { font-family: "Bricolage Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/BricolageGrotesque-Bold.ttf") format("truetype"); font-weight: 700; }
@font-face { font-family: "JetBrains Mono Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/JetBrainsMono-Regular.ttf") format("truetype"); font-weight: 400; }
@font-face { font-family: "IBM Plex Serif Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/IBMPlexSerif-Bold.ttf") format("truetype"); font-weight: 700; }
* { box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1920px;
  margin: 0;
  overflow: hidden;
  background: #061b2d;
}
body {
  font-family: "Work Sans Local", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
.poster {
  --navy: #061b2d;
  --navy-2: #0b2439;
  --sky: #e8f6ff;
  --blue: #1594f6;
  --blue-2: #0e79d8;
  --maroon: #751e38;
  --orange: #e87345;
  --gold: #f5c04c;
  --ink: #092034;
  --muted: #527084;
  --line: rgba(9, 32, 52, .16);
  --paper: #fbfdff;
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  color: var(--ink);
  background: var(--navy);
}
.header,
.footer {
  position: absolute;
  left: 0;
  right: 0;
  background: var(--navy);
  color: #f4fbff;
}
.header { top: 0; height: 154px; }
.footer { bottom: 0; height: 178px; }
.stage {
  position: absolute;
  left: 0;
  right: 0;
  top: 154px;
  height: 1588px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0) 35%),
    var(--sky);
}
.stage::before {
  content: "";
  position: absolute;
  left: 70px;
  right: 70px;
  top: 72px;
  height: 1px;
  background: rgba(9, 32, 52, .08);
}
.brand {
  position: absolute;
  left: 78px;
  top: 43px;
  height: 78px;
  min-width: 330px;
  display: flex;
  align-items: center;
  padding: 0 26px;
  border-radius: 8px;
  background: #101a2c;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset;
}
.brand-text {
  font-size: 38px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0;
}
.series {
  position: absolute;
  right: 78px;
  top: 52px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 24px;
  line-height: 1.35;
  color: rgba(244,251,255,.72);
  text-align: right;
}
.series strong {
  display: block;
  color: #f4fbff;
  font-size: 32px;
  font-weight: 400;
}
.footer .url {
  position: absolute;
  left: 78px;
  top: 44px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 32px;
  line-height: 1.2;
  color: #ffffff;
}
.footer .cmd {
  position: absolute;
  left: 78px;
  top: 95px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 27px;
  line-height: 1.3;
  color: #b7cede;
}
.footer .mark {
  position: absolute;
  right: 78px;
  top: 48px;
  display: flex;
  gap: 10px;
}
.footer .mark span {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--blue);
}
.footer .mark span:nth-child(2) { background: var(--maroon); }
.footer .mark span:nth-child(3) { background: var(--orange); }
.kicker,
.mono,
.chip,
.small-label,
.node,
.metric-number,
.command,
.skill,
.dimension,
.stack-card {
  font-family: "JetBrains Mono Local", monospace;
  letter-spacing: 0;
}
.wrap {
  position: absolute;
  left: 70px;
  right: 70px;
  top: 86px;
  bottom: 86px;
}
.kicker {
  display: inline-flex;
  align-items: center;
  height: 36px;
  padding: 0 13px;
  border-radius: 8px;
  background: rgba(117, 30, 56, .12);
  color: var(--maroon);
  font-size: 20px;
  text-transform: uppercase;
}
.kicker.blue {
  background: rgba(21, 148, 246, .12);
  color: var(--blue-2);
}
.title {
  margin: 0;
  font-weight: 700;
  letter-spacing: 0;
  color: var(--ink);
}
.title strong {
  color: var(--blue);
  font-weight: 700;
}
.subtitle {
  margin: 0;
  font-size: 40px;
  line-height: 1.34;
  color: #183c55;
  font-weight: 700;
}
.subtitle em {
  color: var(--maroon);
  font-style: normal;
}
.panel {
  border-radius: 8px;
  background: rgba(255, 255, 255, .78);
  border: 2px solid rgba(9, 32, 52, .10);
  box-shadow: 0 18px 36px rgba(6, 27, 45, .08);
}
.blue-panel {
  border-radius: 8px;
  background: var(--blue);
  color: #ffffff;
  box-shadow: 0 22px 45px rgba(21, 148, 246, .28);
}
.maroon-panel {
  border-radius: 8px;
  background: var(--maroon);
  color: #ffffff;
  box-shadow: 0 22px 45px rgba(117, 30, 56, .20);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
.chip {
  height: 58px;
  display: inline-flex;
  align-items: center;
  padding: 0 20px;
  border-radius: 8px;
  background: #ffffff;
  border: 2px solid rgba(21, 148, 246, .35);
  color: #12324b;
  font-size: 21px;
}
.chip.dark {
  background: var(--navy);
  border-color: rgba(255,255,255,.18);
  color: #f4fbff;
}
.rule {
  width: 100%;
  height: 2px;
  background: var(--line);
}

.p4 .title {
  position: absolute;
  left: 70px;
  top: 190px;
  width: 920px;
  font-family: "Bricolage Local", "Work Sans Local", sans-serif;
  font-size: 138px;
  line-height: .95;
}
.p4 .subtitle {
  position: absolute;
  left: 70px;
  top: 372px;
  width: 780px;
  font-size: 43px;
  line-height: 1.28;
}
.p4 .desk {
  display: none;
}
.p4 .steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.p4 .step {
  height: 150px;
  padding: 20px 15px;
  text-align: center;
  border-radius: 8px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.26);
}
.p4 .step b {
  display: block;
  font-size: 26px;
  line-height: 1.12;
}
.p4 .step span {
  display: block;
  margin-top: 12px;
  font-size: 18px;
  line-height: 1.24;
  color: rgba(255,255,255,.76);
}
.p4 .stamp {
  position: absolute;
  left: 158px;
  right: 158px;
  top: 196px;
  height: 66px;
  border: 3px solid rgba(255,255,255,.82);
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotate(-1.6deg);
  font-family: "Bricolage Local", "Work Sans Local", sans-serif;
  font-size: 38px;
}
.p4 .score-title {
  display: none;
}
.p4 .dimension-grid {
  display: none;
}
.p4 .dimension {
  height: 56px;
  padding: 0 20px;
  border-radius: 8px;
  background: #ffffff;
  border: 1px solid rgba(9,32,52,.13);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 18px;
  color: #14324a;
}
.p4 .dimension span {
  color: var(--maroon);
}
.p4 .exit {
  display: none;
}
.p4 .exit b {
  font-family: "Bricolage Local", "Work Sans Local", sans-serif;
  font-size: 38px;
}
.p4 .exit span {
  font-size: 22px;
  line-height: 1.25;
  font-weight: 700;
  color: rgba(255,255,255,.82);
}
.p4 .stage-mark {
  display: none;
}
.p4 .review-loop {
  position: absolute;
  left: 92px;
  top: 575px;
  width: 850px;
  height: 610px;
}
.p4 .review-box {
  position: absolute;
  width: 310px;
  height: 156px;
  border-radius: 8px;
  background: rgba(255,255,255,.92);
  border: 2px solid rgba(9,32,52,.12);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 38px;
  line-height: 1.08;
  font-weight: 700;
  box-shadow: 0 18px 34px rgba(6,27,45,.08);
}
.p4 .review-box.dark {
  background: var(--maroon);
  color: #ffffff;
}
.p4 .r1 { left: 0; top: 0; }
.p4 .r2 { right: 0; top: 0; }
.p4 .r3 { right: 0; bottom: 0; }
.p4 .r4 { left: 0; bottom: 0; }
.p4 .review-arrow {
  position: absolute;
  font-size: 72px;
  line-height: 1;
  color: var(--blue);
  font-weight: 700;
}
.p4 .a1 { left: 386px; top: 40px; }
.p4 .a2 { right: 118px; top: 258px; transform: rotate(90deg); }
.p4 .a3 { left: 386px; bottom: 40px; transform: rotate(180deg); }
.p4 .a4 { left: 118px; top: 258px; transform: rotate(270deg); }
.p4 .loop-label {
  position: absolute;
  left: 292px;
  top: 226px;
  width: 266px;
  height: 158px;
  border-radius: 8px;
  background: var(--blue);
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 36px;
  line-height: 1.12;
  font-weight: 700;
  box-shadow: 0 20px 38px rgba(21,148,246,.24);
}
.p4 .rubric-panel {
  position: absolute;
  left: 70px;
  right: 70px;
  top: 1228px;
  min-height: 202px;
  padding: 24px 26px;
  border-radius: 8px;
  background: rgba(255,255,255,.88);
  border: 2px solid rgba(9,32,52,.10);
  box-shadow: 0 16px 30px rgba(6,27,45,.07);
}
.p4 .rubric-panel b {
  display: block;
  margin-bottom: 16px;
  color: var(--maroon);
  font-size: 32px;
  line-height: 1.05;
}
.p4 .rubric-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.p4 .rubric-chips span {
  min-height: 44px;
  padding: 9px 14px;
  border-radius: 8px;
  background: #ffffff;
  border: 1px solid rgba(9,32,52,.12);
  color: #14324a;
  font-size: 21px;
  line-height: 1.05;
  font-weight: 700;
}
.p4 .rubric-note {
  margin-top: 16px;
  color: var(--muted);
  font-family: "JetBrains Mono Local", monospace;
  font-size: 19px;
  line-height: 1.25;
}
</style>
</head>
<body><main class="poster">
    <header class="header">
      <div class="brand"><div class="brand-text">AER-Skills</div></div>
      <div class="series">XHS POSTER<strong>04/05</strong></div>
    </header>
    <section class="stage"><div class="wrap p4">
        <h1 class="title">AER-Skills</h1>
        <p class="subtitle">投稿前内审循环</p>
        <div class="review-loop" aria-label="AER-Skills referee simulation loop">
          <div class="review-box r1">一致性<br>审计</div>
          <div class="review-arrow a1">→</div>
          <div class="review-box dark r2">三位<br>审稿人</div>
          <div class="review-arrow a2">→</div>
          <div class="review-box r3">修改<br>清单</div>
          <div class="review-arrow a3">→</div>
          <div class="review-box r4">重新<br>过门</div>
          <div class="review-arrow a4">→</div>
          <div class="loop-label">≥<br>Major R&amp;R</div>
        </div>
        <div class="rubric-panel">
          <b>审稿模拟评分维度</b>
          <div class="rubric-chips">
            <span>贡献</span><span>识别</span><span>数据</span><span>稳健</span>
            <span>效应量</span><span>表图</span><span>文字</span><span>完整性</span>
          </div>
          <div class="rubric-note">desk screen + 3 adversarial referees + routed revise list</div>
        </div>
      </div></section>
    <footer class="footer">
      <div class="url">github.com/brycewang-stanford/AER-Skills</div>
      <div class="cmd">aer-consistency -&gt; aer-referee-sim</div>
      <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
    </footer>
  </main></body>
</html>
