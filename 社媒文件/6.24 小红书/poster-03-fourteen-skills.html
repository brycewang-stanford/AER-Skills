* { box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1920px;
  margin: 0;
  overflow: hidden;
  background: #061b2d;
}
body {
  font-family: "Work Sans Local", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
.poster {
  --navy: #061b2d;
  --navy-2: #0b2439;
  --sky: #e8f6ff;
  --blue: #1594f6;
  --blue-2: #0e79d8;
  --maroon: #751e38;
  --orange: #e87345;
  --gold: #f5c04c;
  --ink: #092034;
  --muted: #527084;
  --line: rgba(9, 32, 52, .16);
  --paper: #fbfdff;
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  color: var(--ink);
  background: var(--navy);
}
.header,
.footer {
  position: absolute;
  left: 0;
  right: 0;
  background: var(--navy);
  color: #f4fbff;
}
.header { top: 0; height: 154px; }
.footer { bottom: 0; height: 178px; }
.stage {
  position: absolute;
  left: 0;
  right: 0;
  top: 154px;
  height: 1588px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0) 35%),
    var(--sky);
}
.stage::before {
  content: "";
  position: absolute;
  left: 70px;
  right: 70px;
  top: 72px;
  height: 1px;
  background: rgba(9, 32, 52, .08);
}
.brand {
  position: absolute;
  left: 78px;
  top: 43px;
  height: 78px;
  min-width: 330px;
  display: flex;
  align-items: center;
  padding: 0 26px;
  border-radius: 8px;
  background: #101a2c;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset;
}
.brand-text {
  font-size: 38px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0;
}
.series {
  position: absolute;
  right: 78px;
  top: 52px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 24px;
  line-height: 1.35;
  color: rgba(244,251,255,.72);
  text-align: right;
}
.series strong {
  display: block;
  color: #f4fbff;
  font-size: 32px;
  font-weight: 400;
}
.footer .url {
  position: absolute;
  left: 78px;
  top: 44px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 32px;
  line-height: 1.2;
  color: #ffffff;
}
.footer .cmd {
  position: absolute;
  left: 78px;
  top: 95px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 27px;
  line-height: 1.3;
  color: #b7cede;
}
.footer .mark {
  position: absolute;
  right: 78px;
  top: 48px;
  display: flex;
  gap: 10px;
}
.footer .mark span {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--blue);
}
.footer .mark span:nth-child(2) { background: var(--maroon); }
.footer .mark span:nth-child(3) { background: var(--orange); }
.kicker,
.mono,
.chip,
.small-label,
.node,
.metric-number,
.command,
.skill,
.dimension,
.stack-card {
  font-family: "JetBrains Mono Local", monospace;
  letter-spacing: 0;
}
.wrap {

  left: 70px;
  right: 70px;

  bottom: 86px;
}
.kicker {
  display: inline-flex;

  height: 36px;
  padding: 0 13px;
  border-radius: 8px;
  background: rgba(117, 30, 56, .12);
  color: var(--maroon);
  font-size: 20px;
  text-transform: uppercase;
}
.kicker.blue {
  background: rgba(21, 148, 246, .12);
  color: var(--blue-2);
}
.title {
  margin: 0;
  font-weight: 700;
  letter-spacing: 0;
  color: var(--ink);
}
.title strong {
  color: var(--blue);

}
.subtitle {

  font-size: 40px;
  line-height: 1.34;

}
.subtitle em {

.panel {

  border: 2px solid rgba(9, 32, 52, .10);
  box-shadow: 0 18px 36px rgba(6, 27, 45, .08);
}
.blue-panel {
  border-radius: 8px;

  color: #ffffff;
  box-shadow: 0 22px 45px rgba(21, 148, 246, .28);
}
.maroon-panel {
  border-radius: 8px;
  background: var(--maroon);
  color: #ffffff;
  box-shadow: 0 22px 45px rgba(117, 30, 56, .20);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
.chip {
  height: 58px;
  display: inline-flex;
  align-items: center;
  padding: 0 20px;
  border-radius: 8px;
  background: #ffffff;
  border: 2px solid rgba(21, 148, 246, .35);
  color: #12324b;
  font-size: 21px;
}
.chip.dark {
  background: var(--navy);
  border-color: rgba(255,255,255,.18);
  color: #f4fbff;
}
.rule {
  width: 100%;
  height: 2px;
  background: var(--line);
}
