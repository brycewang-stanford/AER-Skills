<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>Poster 01 - AER-Skills</title>
<style>
@font-face { font-family: "Work Sans Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/WorkSans-Regular.ttf") format("truetype"); font-weight: 400; }
@font-face { font-family: "Work Sans Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/WorkSans-Bold.ttf") format("truetype"); font-weight: 700; }
@font-face { font-family: "Bricolage Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/BricolageGrotesque-Bold.ttf") format("truetype"); font-weight: 700; }
@font-face { font-family: "JetBrains Mono Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/JetBrainsMono-Regular.ttf") format("truetype"); font-weight: 400; }
@font-face { font-family: "IBM Plex Serif Local"; src: url("file:///Users/brycewang/.codex/skills/canvas-design/canvas-fonts/IBMPlexSerif-Bold.ttf") format("truetype"); font-weight: 700; }
* { box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1920px;
  margin: 0;
  overflow: hidden;
  background: #061b2d;
}
body {
  font-family: "Work Sans Local", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
.poster {
  --navy: #061b2d;
  --navy-2: #0b2439;
  --sky: #e8f6ff;
  --blue: #1594f6;
  --blue-2: #0e79d8;
  --maroon: #751e38;
  --orange: #e87345;
  --gold: #f5c04c;
  --ink: #092034;
  --muted: #527084;
  --line: rgba(9, 32, 52, .16);
  --paper: #fbfdff;
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  color: var(--ink);
  background: var(--navy);
}
.header,
.footer {
  position: absolute;
  left: 0;
  right: 0;
  background: var(--navy);
  color: #f4fbff;
}
.header { top: 0; height: 154px; }
.footer { bottom: 0; height: 178px; }
.stage {
  position: absolute;
  left: 0;
  right: 0;
  top: 154px;
  height: 1588px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0) 35%),
    var(--sky);
}
.stage::before {
  content: "";
  position: absolute;
  left: 70px;
  right: 70px;
  top: 72px;
  height: 1px;
  background: rgba(9, 32, 52, .08);
}
.brand {
  position: absolute;
  left: 78px;
  top: 43px;
  height: 78px;
  min-width: 330px;
  display: flex;
  align-items: center;
  padding: 0 26px;
  border-radius: 8px;
  background: #101a2c;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset;
}
.brand-text {
  font-size: 38px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0;
}
.series {
  position: absolute;
  right: 78px;
  top: 52px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 24px;
  line-height: 1.35;
  color: rgba(244,251,255,.72);
  text-align: right;
}
.series strong {
  display: block;
  color: #f4fbff;
  font-size: 32px;
  font-weight: 400;
}
.footer .url {
  position: absolute;
  left: 78px;
  top: 44px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 32px;
  line-height: 1.2;
  color: #ffffff;
}
.footer .cmd {
  position: absolute;
  left: 78px;
  top: 95px;
  font-family: "JetBrains Mono Local", monospace;
  font-size: 27px;
  line-height: 1.3;
  color: #b7cede;
}
.footer .mark {
  position: absolute;
  right: 78px;
  top: 48px;
  display: flex;
  gap: 10px;
}
.footer .mark span {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--blue);
}
.footer .mark span:nth-child(2) { background: var(--maroon); }
.footer .mark span:nth-child(3) { background: var(--orange); }
.kicker,
.mono,
.chip,
.small-label,
.node,
.metric-number,
.command,
.skill,
.dimension,
.stack-card {
  font-family: "JetBrains Mono Local", monospace;
  letter-spacing: 0;
}
.wrap {
  position: absolute;
  left: 70px;
  right: 70px;
  top: 86px;
  bottom: 86px;
}
.kicker {
  display: inline-flex;
  align-items: center;
  height: 36px;
  padding: 0 13px;
  border-radius: 8px;
  background: rgba(117, 30, 56, .12);
  color: var(--maroon);
  font-size: 20px;
  text-transform: uppercase;
}
.kicker.blue {
  background: rgba(21, 148, 246, .12);
  color: var(--blue-2);
}
.title {
  margin: 0;
  font-weight: 700;
  letter-spacing: 0;
  color: var(--ink);
}
.title strong {
  color: var(--blue);
  font-weight: 700;
}
.subtitle {
  margin: 0;
  font-size: 40px;
  line-height: 1.34;
  color: #183c55;
  font-weight: 700;
}
.subtitle em {
  color: var(--maroon);
  font-style: normal;
}
.panel {
  border-radius: 8px;
  background: rgba(255, 255, 255, .78);
  border: 2px solid rgba(9, 32, 52, .10);
  box-shadow: 0 18px 36px rgba(6, 27, 45, .08);
}
.blue-panel {
  border-radius: 8px;
  background: var(--blue);
  color: #ffffff;
  box-shadow: 0 22px 45px rgba(21, 148, 246, .28);
}
.maroon-panel {
  border-radius: 8px;
  background: var(--maroon);
  color: #ffffff;
  box-shadow: 0 22px 45px rgba(117, 30, 56, .20);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
.chip {
  height: 58px;
  display: inline-flex;
  align-items: center;
  padding: 0 20px;
  border-radius: 8px;
  background: #ffffff;
  border: 2px solid rgba(21, 148, 246, .35);
  color: #12324b;
  font-size: 21px;
}
.chip.dark {
  background: var(--navy);
  border-color: rgba(255,255,255,.18);
  color: #f4fbff;
}
.rule {
  width: 100%;
  height: 2px;
  background: var(--line);
}

.p1-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  pointer-events: none;
}
.p1-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(232,246,255,.88) 0%, rgba(232,246,255,.66) 43%, rgba(232,246,255,.30) 100%),
    linear-gradient(180deg, rgba(232,246,255,.95) 0%, rgba(232,246,255,.38) 48%, rgba(232,246,255,.88) 100%);
}
.p1 .aer-cover-bg {
  width: 1160px;
  height: 1680px;
  object-fit: cover;
  object-position: center;
  opacity: .32;
  transform: translateX(72px) rotate(-1.2deg);
  filter: saturate(.96) contrast(1.08);
}
.p1 .hero {
  display: none;
}
.p1 .title {
  display: none;
}
.p1 .subtitle {
  display: none;
}
.p1 .journal-lockup {
  position: absolute;
  left: 70px;
  top: 720px;
  width: 840px;
  padding: 52px 54px 54px;
  border-radius: 8px;
  background: rgba(117, 30, 56, .92);
  color: #ffffff;
  box-shadow: 0 28px 60px rgba(117, 30, 56, .20);
}
.p1 .journal-name {
  font-family: "IBM Plex Serif Local", serif;
  font-size: 84px;
  line-height: .98;
  letter-spacing: 0;
}
.p1 .journal-meta {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.p1 .journal-meta span {
  min-height: 78px;
  padding: 16px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.28);
  background: rgba(255,255,255,.12);
  font-family: "JetBrains Mono Local", monospace;
  font-size: 18px;
  line-height: 1.24;
}
.p1 .journal-meta b {
  display: block;
  margin-bottom: 5px;
  font-size: 22px;
  line-height: 1;
  color: #ffffff;
}
.p1 .aer-skills-title {
  position: absolute;
  left: 60px;
  top: 250px;
  width: 960px;
  margin: 0;
  color: var(--blue);
  font-family: "Times New Roman", Times, serif;
  font-size: 168px;
  line-height: .9;
  font-weight: 700;
  letter-spacing: 0;
  white-space: nowrap;
  text-shadow: 0 18px 42px rgba(21, 148, 246, .18), 0 2px 0 rgba(255,255,255,.72);
}
.p1 .question {
  position: absolute;
  left: 66px;
  top: 438px;
  width: 900px;
  margin: 0;
  color: #092034;
  font-family: "Work Sans Local", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: 88px;
  line-height: 1.08;
  font-weight: 700;
  letter-spacing: 0;
  text-shadow: 0 2px 0 rgba(255,255,255,.70);
}
</style>
</head>
<body><main class="poster">
    <header class="header">
      <div class="brand"><div class="brand-text">AER-Skills</div></div>
      <div class="series">XHS POSTER<strong>01/05</strong></div>
    </header>
    <section class="stage"><div class="p1-bg"><img class="aer-cover-bg" src="file:///Users/brycewang/Documents/GitHub/AER-Skills/assets/aer-cover-official.svg" alt="American Economic Review cover" /></div>
      <div class="wrap p1">
        <div class="journal-lockup">
          <div class="journal-name">The American<br>Economic Review</div>
          <div class="journal-meta">
            <span><b>1911</b>established</span>
            <span><b>ISSN</b>0002-8282</span>
            <span><b>12</b>issues / year</span>
          </div>
        </div>
        <h1 class="aer-skills-title">AER-Skills</h1>
        <p class="question">如何用 Agent<br>快速发表一篇 AER？</p>
      </div></section>
    <footer class="footer">
      <div class="url">github.com/brycewang-stanford/AER-Skills</div>
      <div class="cmd">python3 scripts/validate_repo.py</div>
      <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
    </footer>
  </main></body>
</html>
